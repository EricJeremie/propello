<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PocketDevs — Proposal Generator</title>
  <link rel="icon" href="assets/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <!-- ====================== APP BAR ====================== -->
  <header class="appbar no-print">
    <div class="appbar__brand">
      <img src="assets/logo.svg" alt="PocketDevs" class="appbar__logo js-logo" />
      <span class="appbar__divider"></span>
      <span class="appbar__title">Proposal Generator</span>
    </div>
    <div class="appbar__actions">
      <button id="authNavBtn" class="btn btn--ghost">Login</button>
      <button id="settingsBtn" class="btn btn--ghost" type="button">
        <span class="dot" id="keyDot"></span> Settings
      </button>
      <button id="downloadBtn" class="btn btn--primary" type="button" disabled>Download PDF</button>
    </div>
  </header>

  <main class="layout">
    <aside class="composer no-print">
      <!-- Auth Modal -->
      <div id="authModal" class="modal">
        <div class="modal__content card">
          <button id="closeAuth" class="modal__close">&times;</button>
          <h2 class="card__title">Sign in to PocketDevs</h2>
          <form id="authForm">
            <div class="field">
              <label class="label">Email</label>
              <input id="authEmail" type="email" class="input" required />
            </div>
            <div class="field">
              <label class="label">Password</label>
              <input id="authPassword" type="password" class="input" required />
            </div>
            <div class="grid2">
              <button type="submit" data-mode="login" class="btn btn--primary">Login</button>
              <button type="submit" data-mode="signup" class="btn btn--ghost">Sign Up</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Settings -->
      <section id="settingsPanel" class="card card--settings" hidden>
        <h2 class="card__title">Anthropic API key</h2>
        <div class="field">
          <input id="apiKey" type="password" class="input" placeholder="sk-ant-..." />
        </div>
        <div class="field field--row">
          <label class="check"><input type="checkbox" id="showKey" /> Show</label>
          <button id="saveKey" class="btn btn--primary btn--sm">Save key</button>
        </div>
        <hr class="rule" />
        <h2 class="card__title">Logo</h2>
        <div class="logo-row">
          <img id="logoPreview" class="logo-preview js-logo" src="assets/logo.svg" />
          <input id="logoInput" type="file" accept="image/*" hidden />
          <button id="logoUploadBtn" class="btn btn--primary btn--sm">Upload</button>
          <button id="logoResetBtn" class="btn btn--ghost btn--sm">Reset</button>
        </div>
      </section>

      <!-- Step 1 — Source -->
      <section class="card">
        <div class="step"><span class="step__n">1</span><h2 class="card__title">Source document</h2></div>
        <label id="dropzone" class="dropzone" for="fileInput">
          <input id="fileInput" type="file" accept="application/pdf" hidden />
          <span class="dropzone__text"><strong>Drop a PDF</strong> or browse</span>
          <span class="dropzone__file" id="fileName">No file selected</span>
        </label>
      </section>

      <!-- History Section -->
      <section class="card history-card">
        <div class="step"><span class="step__n">H</span><h2 class="card__title">My Proposals</h2></div>
        <div id="historyList" class="history-list"></div>
      </section>

      <!-- Step 2 — Details -->
      <section class="card">
        <div class="step"><span class="step__n">2</span><h2 class="card__title">Proposal details</h2></div>
        <div class="grid2">
          <div class="field"><label class="label">Client</label><input id="f_company" class="input" /></div>
          <div class="field"><label class="label">Project</label><input id="f_title" class="input" /></div>
          <div class="field"><label class="label">Contact</label><input id="f_contact" class="input" /></div>
          <div class="field"><label class="label">Role</label><input id="f_contactTitle" class="input" /></div>
          <div class="field"><label class="label">Currency</label>
            <select id="f_currency" class="input">
              <option value="PHP" data-symbol="₱">PHP</option>
              <option value="USD" data-symbol="$">USD</option>
            </select>
          </div>
          <div class="field"><label class="label">Locale</label>
            <select id="f_locale" class="input">
              <option value="en-PH">Philippines</option>
              <option value="en-US">US</option>
            </select>
          </div>
          <div class="field"><label class="label">Cost</label><input id="f_cost" class="input" /></div>
          <div class="field"><label class="label">Timeline</label><input id="f_timeline" class="input" /></div>
          <div class="field"><label class="label">Valid until</label><input id="f_valid" class="input" /></div>
          <div class="field"><label class="label">Doc no.</label><input id="f_docno" class="input" /></div>
          <div class="field"><label class="label">Date</label><input id="f_date" class="input" /></div>
        </div>
        <div class="field"><label class="label">Notes</label><textarea id="f_notes" class="input textarea" rows="2"></textarea></div>
        <input id="f_signatory" type="hidden" value="Eric Jeremie Rotaquio" />
        <input id="f_signatoryTitle" type="hidden" value="Chief Executive Officer, PocketDevs" />
        <input id="f_budget" type="hidden" value="" />
        <input id="f_paymentDetails" type="hidden" value="" />
      </section>

      <!-- Step 3 — Generate -->
      <section class="card">
        <div class="step"><span class="step__n">3</span><h2 class="card__title">Generate</h2></div>
        <button id="generateBtn" class="btn btn--primary btn--block">Generate proposal</button>
        <div id="status" class="status" hidden></div>
      </section>
    </aside>

    <div class="stage">
      <div class="paper-wrap">
        <article id="proposal" class="proposal">
          <div id="emptyState" class="empty">
            <img src="assets/logo.svg" class="empty__logo js-logo" />
            <h2>Your proposal will appear here</h2>
            <p>Login, drop a PDF, and hit Generate.</p>
          </div>
        </article>
      </div>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
