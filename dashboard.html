<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PocketDevs — My Documents</title>
  <link rel="icon" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=24" />
  <script defer src="preloader.js?v=1"></script>
</head>
<body>
  <!-- Site preloader (fades out on load) -->
  <div id="preloader" class="preloader" role="status" aria-label="Loading">
    <div class="preloader__inner">
      <img src="assets/logo.svg" alt="PocketDevs" class="preloader__logo" />
      <span class="preloader__spinner" aria-hidden="true"></span>
    </div>
  </div>

  <!-- Auth gate (full-screen login — shown when not authenticated) -->
  <div id="authGate" class="auth-gate" hidden>
    <div class="auth-gate__card card">
      <img src="assets/logo.svg" alt="PocketDevs" class="auth-gate__logo" />
      <h1 class="auth-gate__title">Documents Generator</h1>
      <p class="auth-gate__sub">Sign in to access your proposals, invoices, and client documents.</p>
      <div class="grid2" role="tablist" style="margin-bottom:1.25rem">
        <button type="button" id="authTabLogin" class="btn btn--primary" aria-pressed="true">Log in</button>
        <button type="button" id="authTabSignup" class="btn btn--ghost" aria-pressed="false">Sign up</button>
      </div>
      <form id="authForm">
        <div class="field" id="authNameField" hidden>
          <label class="label">Full name</label>
          <input id="authName" type="text" class="input" autocomplete="name" />
        </div>
        <div class="field">
          <label class="label">Email</label>
          <input id="authEmail" type="email" class="input" required autocomplete="email" />
        </div>
        <div class="field">
          <label class="label">Password</label>
          <input id="authPassword" type="password" class="input" required minlength="6" autocomplete="current-password" />
        </div>
        <button type="submit" id="authSubmit" class="btn btn--primary btn--block">Log in</button>
        <div id="authError" class="status status--error" hidden></div>
      </form>
    </div>
  </div>

  <!-- Main app body (shown when authenticated) -->
  <div class="app-body" id="appBody" style="visibility:hidden">
    <main class="dash-page">

      <div id="dashContent">
        <div class="dash-page__hero">
          <h1 class="dash-page__title">My Documents</h1>
          <p class="dash-page__subtitle">All your proposals, invoices, and requirement questionnaires</p>
        </div>

        <div class="dash-page__controls">
          <div class="dash-page__tabs" role="tablist">
            <button type="button" class="dash-page__tab dash-page__tab--active" data-type="all" role="tab" aria-selected="true">All</button>
            <button type="button" class="dash-page__tab" data-type="proposal" role="tab" aria-selected="false">Proposals</button>
            <button type="button" class="dash-page__tab" data-type="invoice" role="tab" aria-selected="false">Invoices</button>
            <button type="button" class="dash-page__tab" data-type="questionnaire" role="tab" aria-selected="false">Questionnaires</button>
          </div>
          <input id="dashSearch" class="input dash-page__search" type="search" placeholder="Search by title, client, or doc no." />
        </div>

        <div id="dashGrid" class="dash-page__grid">
          <p class="dash-page__empty">Loading…</p>
        </div>
      </div>

    </main>
  </div>

  <script type="module" src="dashboard.js?v=6"></script>
</body>
</html>
